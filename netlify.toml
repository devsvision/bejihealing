[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/payments/ottopay/create"
  to = "/.netlify/functions/ottopay-create"
  status = 200

[[redirects]]
  from = "/api/ottopay/callback"
  to = "/.netlify/functions/ottopay-callback"
  status = 200

[[redirects]]
  from = "/api/google/reviews"
  to = "/.netlify/functions/google-reviews"
  status = 200

[[redirects]]
  from = "/api/instagram/feed"
  to = "/.netlify/functions/instagram-feed"
  status = 200

[[redirects]]
  from = "/api/tiktok/feed"
  to = "/.netlify/functions/tiktok-feed"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
