<section class="grid gap-5 xl:grid-cols-[.8fr_1fr]">
  <div class="glass-card luxury-border p-5">
    <p class="eyebrow">Settings</p>
    <h1 class="font-display text-4xl mt-2">Retreat system preferences.</h1>
    <p class="mt-4 text-white/55">Configure gateway mode, currency display, roles, taxes, and notification defaults.</p>
  </div>
  <form class="glass-card luxury-border p-5 space-y-4">
    <label>Default Currency<input class="glass-input mt-2" value="IDR" /></label>
    <label>Tax Rate<input class="glass-input mt-2" value="11%" /></label>
    <label>Primary Gateway<select class="glass-input mt-2"><option>Midtrans</option><option>HitPay</option><option>OttoPay</option></select></label>
    <button class="luxury-button" type="button">Save Settings</button>
  </form>
</section>
