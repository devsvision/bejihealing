<section class="relative grid min-h-screen place-items-center overflow-hidden p-4">
  <div class="animated-blur left-10 top-10"></div>
  <form class="glass-card luxury-border w-full max-w-md p-7" onsubmit="event.preventDefault(); window.login(this.email.value, this.password.value)">
    <p class="eyebrow">Admin Access</p>
    <h1 class="font-display text-4xl mt-3">Return to the sanctuary OS.</h1>
    <label class="mt-7 block">Email<input name="email" type="email" class="glass-input mt-2" value="admin@bejihealing.com" /></label>
    <label class="mt-4 block">Password<input name="password" type="password" class="glass-input mt-2" value="healing" /></label>
    <button class="luxury-button mt-6 w-full">Login</button>
  </form>
</section>
