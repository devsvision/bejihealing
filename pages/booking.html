<section class="section-pad pt-36">
  <div class="container-lux grid gap-8 lg:grid-cols-[1fr_.78fr]">
    <form id="booking-form" class="glass-card luxury-border p-6 reveal">
      <p class="eyebrow">Booking System</p>
      <h1 class="font-display text-4xl mt-3">Create a retreat reservation.</h1>
      <div class="mt-8 grid gap-5">
        <label>Program<select id="program" name="programId" class="glass-input mt-2"></select></label>
        <label>Date<input id="booking-date" name="date" type="date" required class="glass-input mt-2" /></label>
        <label>Guests<input id="guests" name="guests" type="number" min="1" value="1" class="glass-input mt-2" /></label>
        <label>Payment Provider<select name="provider" class="glass-input mt-2"><option value="midtrans">Midtrans</option><option value="hitpay">HitPay</option><option value="ottopay">OttoPay QRIS</option></select></label>
      </div>
      <button class="luxury-button mt-7 w-full" type="submit">Checkout Booking</button>
      <button id="checkout-button" class="hidden" type="button" data-pay data-customer="Retreat Guest"></button>
    </form>
    <aside class="space-y-5">
      <div class="glass-card luxury-border p-6 reveal">
        <p class="eyebrow">Invoice Preview</p>
        <h2 id="summary-program" class="font-display text-3xl mt-3"></h2>
        <p id="summary-guests" class="mt-4 text-white/55"></p>
        <p id="summary-total" class="mt-6 font-display text-4xl text-gold"></p>
      </div>
      <div class="glass-card luxury-border p-6 reveal">
        <h2 class="font-display text-2xl">Booking History</h2>
        <div id="booking-history" class="mt-5 space-y-3"></div>
      </div>
    </aside>
  </div>
</section>
