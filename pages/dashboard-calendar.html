<section class="space-y-5">
  <div class="glass-card luxury-border p-5">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div>
        <p class="eyebrow" data-i18n="bookingCalendar">Kalender Booking</p>
        <h2 id="calendar-title" class="font-display text-3xl mt-2">Kalender Booking</h2>
      </div>
      <div class="flex items-center gap-2">
        <button class="ghost-button !min-h-10 !px-3" type="button" data-calendar-prev aria-label="Bulan sebelumnya" data-i18n-aria="previousMonth">
          <i data-lucide="chevron-left" class="size-4"></i>
        </button>
        <button class="ghost-button !min-h-10 !px-4" type="button" data-calendar-today data-i18n="thisMonth">Bulan Ini</button>
        <button class="ghost-button !min-h-10 !px-3" type="button" data-calendar-next aria-label="Bulan berikutnya" data-i18n-aria="nextMonth">
          <i data-lucide="chevron-right" class="size-4"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="glass-card luxury-border overflow-x-auto p-5">
    <div class="min-w-[64rem]">
      <div class="grid grid-cols-7 gap-2 text-center text-xs font-semibold uppercase tracking-[.14em] text-white/45">
        <span data-i18n="sunday">Min</span>
        <span data-i18n="monday">Sen</span>
        <span data-i18n="tuesday">Sel</span>
        <span data-i18n="wednesday">Rab</span>
        <span data-i18n="thursday">Kam</span>
        <span data-i18n="friday">Jum</span>
        <span data-i18n="saturday">Sab</span>
      </div>
      <div id="booking-calendar-grid" class="mt-3 grid grid-cols-7 gap-2"></div>
    </div>
  </div>
</section>
