<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Beji Healing, a luxury forest healing retreat with booking, POS, finance, and admin dashboard systems." />
    <title>Beji Healing Retreat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Poppins", "sans-serif"],
              display: ["Cinzel", "serif"]
            },
            colors: {
              obsidian: "#050505",
              charcoal: "#0d0d0d",
              forest: "#0f3d2e",
              emerald: "#1f6b52",
              gold: "#d4af37",
              ivory: "#f5f5f5"
            },
            boxShadow: {
              luxury: "0 24px 80px rgba(0,0,0,.42), 0 0 44px rgba(212,175,55,.16)",
              emerald: "0 18px 50px rgba(31,107,82,.22)",
              gold: "0 0 34px rgba(212,175,55,.35)"
            },
            animation: {
              shimmer: "shimmer 2.8s linear infinite",
              float: "float 7s ease-in-out infinite",
              pulseSoft: "pulseSoft 4s ease-in-out infinite",
              fadeUp: "fadeUp .7s ease both"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="./assets/css/global.css" />
    <link rel="stylesheet" href="./assets/css/animation.css" />
    <link rel="stylesheet" href="./assets/css/glassmorphism.css" />
    <link rel="stylesheet" href="./assets/css/dashboard.css" />
    <link rel="stylesheet" href="./assets/css/responsive.css" />
  </head>
  <body class="bg-obsidian text-ivory font-sans antialiased">
    <div id="loading-root"></div>
    <div id="shell"></div>
    <div id="app" class="min-h-screen"></div>
    <div id="modal-root"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
